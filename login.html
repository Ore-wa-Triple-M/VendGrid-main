<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VendGrid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/shared.css">
    <link rel="stylesheet" href="assets/css/login.css">
    <link rel="stylesheet" href="assets/css/light-theme.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-lg-5 col-md-7 col-sm-9">
                    <div class="login-card">
                        <div class="login-header text-center mb-4">
                            <a href="index.html" class="login-logo">
                                <i class="fas fa-cash-register"></i>
                                <span>VendGrid</span>
                            </a>
                            <h2 class="login-title">Welcome Back</h2>
                            <p class="login-subtitle">Sign in to your account</p>
                        </div>

                        <!-- Unverified email banner -->
                        <div id="unverifiedBanner" class="alert alert-warning" style="display:none; border-radius:10px;">
                            <i class="fas fa-envelope-open-text me-2"></i>
                            <span>Please verify your email before signing in. 
                                <a href="verify-email.html" class="alert-link">Click here to resend verification</a>
                            </span>
                        </div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" required autocomplete="email">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <div class="password-input-group">
                                    <input type="password" class="form-control" id="password" required autocomplete="current-password">
                                    <button type="button" class="password-toggle" onclick="togglePassword()">
                                        <i class="fas fa-eye" id="passwordToggleIcon"></i>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 login-btn">Sign In</button>
                        </form>

                        <div class="login-footer text-center mt-4">
                            <div class="login-divider"><span>or</span></div>
                            <a href="signup.html" class="back-to-home-link">
                                <i class="fas fa-user-plus me-2"></i>Don't have an account? Sign Up
                            </a><br>
                            <a href="index.html" class="back-to-home-link mt-1 d-inline-block">
                                <i class="fas fa-arrow-left me-2"></i>Back to Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="login-background">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
    </div>

    <div id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/permissions.js"></script>
    <script src="assets/js/auth.js"></script>
   
</body>
</html>
