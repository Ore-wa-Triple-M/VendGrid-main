<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - VendGrid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/shared.css">
    <link rel="stylesheet" href="assets/css/login.css">
     <link rel="stylesheet" href="assets/css/light-theme.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-lg-5 col-md-7 col-sm-9">
                    <div class="login-card">
                        <div class="login-header text-center mb-4">
                            <a href="index.html" class="login-logo">
                                <i class="fas fa-cash-register"></i>
                                <span>VendGrid</span>
                            </a>
                            <h2 class="login-title">Create Account</h2>
                            <p class="login-subtitle">Sign up to start using VendGrid</p>
                        </div>
                        <form id="signupForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="firstName" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="lastName" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="machariamoriss877@gmail.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <div class="password-input-group">
                                    <input type="password" class="form-control" id="password" required>
                                    <button type="button" class="password-toggle" onclick="togglePassword()">
                                        <i class="fas fa-eye" id="passwordToggleIcon"></i>
                                    </button>
                                </div>
                                <small class="text-muted">Password must be at least 8 characters</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Role</label>
                                <select id="role" class="form-select">
                                    <option value="cashier">Cashier</option>
                                    <option value="inventory_clerk">Inventory Clerk</option>
                                    <option value="manager">Manager</option>
                                    <option value="admin">Admin</option>
                                </select>
                                <small class="text-muted">Admins have full system access</small>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 login-btn">Sign Up</button>
                        </form>
                        <div class="login-footer text-center mt-4">
                            <div class="login-divider"><span>or</span></div>
                            <a href="login.html" class="back-to-home-link">
                                <i class="fas fa-sign-in-alt me-2"></i>Already have an account? Login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="login-background">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/permissions.js"></script>
    <script src="assets/js/signup.js"></script>
    <script src="assets/js/theme-manager.js"></script>
</body>
</html>
