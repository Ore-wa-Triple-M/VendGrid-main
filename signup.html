<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - VendGrid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/shared.css">
    <link rel="stylesheet" href="assets/css/login.css">
    <link rel="stylesheet" href="assets/css/light-theme.css">
    <style>
        .company-search-result {
            cursor: pointer;
            transition: background 0.15s;
            border: 1px solid #e9ecef;
        }
        .company-search-result:hover {
            background-color: #f8f9fa;
            border-color: #007bff;
        }
        .company-search-result.selected {
            background-color: #e8f0fe;
            border-color: #007bff;
            border-left: 3px solid #007bff;
        }
        .step-transition {
            transition: all 0.3s ease;
        }
        .company-form-section {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-lg-5 col-md-7 col-sm-9">
                    <div class="login-card">
                        <div class="login-header text-center mb-4">
                            <a href="index.html" class="login-logo">
                                <i class="fas fa-cash-register"></i>
                                <span>VendGrid</span>
                            </a>
                            <h2 class="login-title">Create Account</h2>
                            <p class="login-subtitle" id="formSubtitle">Sign up to start using VendGrid</p>
                        </div>

                        <!-- Step 1: User Account Form -->
                        <div id="step1Form">
                            <form id="signupForm">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">First Name</label>
                                        <input type="text" class="form-control" id="firstName" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Last Name</label>
                                        <input type="text" class="form-control" id="lastName" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <div class="password-input-group">
                                        <input type="password" class="form-control" id="password" required>
                                        <button type="button" class="password-toggle" onclick="togglePassword()">
                                            <i class="fas fa-eye" id="passwordToggleIcon"></i>
                                        </button>
                                    </div>
                                    <small class="text-muted">Password must be at least 8 characters</small>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Role</label>
                                    <select id="role" class="form-select">
                                        <option value="cashier">Cashier</option>
                                        <option value="inventory_clerk">Inventory Clerk</option>
                                        <option value="manager">Manager</option>
                                        <option value="admin">Admin</option>
                                    </select>
                                    <small class="text-muted">Admins have full system access</small>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 login-btn">Continue</button>
                            </form>
                        </div>

                        <!-- Step 2: Company Selection/Creation (hidden initially) -->
                        <div id="step2Form" style="display: none;">
                            <div id="companySelectionSection">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Search for your company</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white border-end-0">
                                            <i class="fas fa-search text-muted"></i>
                                        </span>
                                        <input type="text" class="form-control border-start-0" id="companySearch" 
                                               placeholder="Type your company name..." autocomplete="off">
                                    </div>
                                    <div id="searchResults" class="mt-2" style="max-height: 200px; overflow-y: auto;"></div>
                                </div>
                                
                                <div class="text-center">
                                    <button type="button" class="btn btn-outline-primary" id="showNewCompanyBtn">
                                        <i class="fas fa-plus me-2"></i>My company is not listed
                                    </button>
                                </div>
                            </div>

                            <div id="newCompanySection" style="display: none;">
                                <div class="alert alert-info mb-3">
                                    <i class="fas fa-building me-2"></i>
                                    <strong>Create a new company</strong> – Only business name and email are required.
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Business Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="newCompanyName" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Business Email <span class="text-danger">*</span></label>
                                    <input type="email" class="form-control" id="newCompanyEmail" required>
                                </div>
                                <div class="mb-3 optional-field">
                                    <label class="form-label">Phone <span class="text-muted">(Optional)</span></label>
                                    <input type="tel" class="form-control" id="newCompanyPhone">
                                </div>
                                <div class="mb-3 optional-field">
                                    <label class="form-label">Address <span class="text-muted">(Optional)</span></label>
                                    <textarea class="form-control" id="newCompanyAddress" rows="2"></textarea>
                                </div>
                                
                                <div class="d-flex gap-2">
                                    <button type="button" class="btn btn-outline-secondary" id="backToCompanySearchBtn">
                                        <i class="fas fa-arrow-left me-2"></i>Back to search
                                    </button>
                                    <button type="button" class="btn btn-primary flex-grow-1" id="createNewCompanyBtn">
                                        <i class="fas fa-check me-2"></i>Create Company
                                    </button>
                                </div>
                            </div>

                            <div class="mt-3" id="selectedCompanyInfo" style="display: none;">
                                <hr>
                                <div class="alert alert-success">
                                    <i class="fas fa-check-circle me-2"></i>
                                    <strong id="selectedCompanyName"></strong>
                                    <span class="text-muted"> – You're almost done!</span>
                                </div>
                                <button type="button" class="btn btn-success w-100" id="completeSignupBtn">
                                    <i class="fas fa-check me-2"></i>Complete Sign Up
                                </button>
                            </div>
                        </div>

                        <!-- Loading State -->
                        <div id="loadingState" style="display: none;" class="text-center py-4">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-2 text-muted">Creating your account...</p>
                        </div>

                        <!-- Login Link -->
                        <div class="login-footer text-center mt-4" id="loginFooter">
                            <div class="login-divider"><span>or</span></div>
                            <a href="login.html" class="back-to-home-link">
                                <i class="fas fa-sign-in-alt me-2"></i>Already have an account? Login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="login-background">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
    </div>

    <div id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/permissions.js"></script>
    <script src="assets/js/signup.js"></script>
    
</body>
</html>
