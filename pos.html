<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Terminal - VendGrid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/shared.css">
    <link rel="stylesheet" href="assets/css/light-theme.css">
    <link rel="stylesheet" href="assets/css/pos.css">
</head>
<body class="auth-loading">
    <!-- Navbar with mobile menu button -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container-fluid">
            <button class="mobile-menu-toggle" id="mobileMenuToggle" onclick="toggleMobileSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <a class="navbar-brand" href="dashboard.html"><i class="fas fa-cash-register me-2"></i>VendGrid</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle me-1"></i><span id="userName">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#" onclick="signOut()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sidebar Overlay (closes sidebar when clicked) -->
    <div class="sidebar-overlay" onclick="closeMobileSidebar()"></div>

    <div class="sidebar">
        <a href="dashboard.html" class="sidebar-item" data-tooltip="Dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
        <a href="pos.html" class="sidebar-item active" data-tooltip="POS Terminal"><i class="fas fa-cash-register"></i><span>POS Terminal</span></a>
        <a href="inventory.html" class="sidebar-item" data-tooltip="Inventory"><i class="fas fa-boxes"></i><span>Inventory</span></a>
        <a href="reports.html" class="sidebar-item" data-tooltip="Reports"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
        <a href="users.html" class="sidebar-item" data-tooltip="Users"><i class="fas fa-users"></i><span>Users</span></a>
        <a href="settings.html" class="sidebar-item" data-tooltip="Settings"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>

    <div class="pos-container">
        <div class="products-panel">
            <div class="mb-3"><input type="text" id="searchInput" class="form-control" placeholder="Search products..."></div>
            <div id="categoryFilter" class="mb-3 d-flex gap-2 flex-wrap"></div>
            <div id="productGrid" class="product-grid"></div>
        </div>
        <div class="cart-panel">
            <div class="cart-panel-1">
                <div class="p-3 bg-light border-bottom"><h5 class="mb-0"><i class="fas fa-shopping-cart me-2"></i>Cart</h5></div>
                <div class="p-3 bg-light border-bottom" style="display: grid; grid-template-columns: 3fr 1fr 1fr 1fr 80px; gap: 15px; align-items: center;">
                    <h6 class="mb-0 d-flex align-items-center"><i class="fas fa-shopping-bag me-1"></i>Products</h6> 
                    <h6 class="mb-0 ps-3 border-start d-flex align-items-center"><i class="fas fa-tag me-1"></i>Unit Price</h6>
                    <h6 class="mb-0 ps-3 border-start d-flex align-items-center"><i class="fas fa-box me-1"></i>Quantity</h6>
                    <h6 class="mb-0 ps-3 border-start d-flex align-items-center"><i class="fas fa-calculator me-1"></i>Subtotal</h6>
                    <h6 class="mb-0 ps-3 border-start d-flex align-items-center justify-content-center"><i class="fas fa-cogs me-1"></i>Actions</h6> 
                </div>
                <div id="cartItems" class="flex-grow-1 overflow-auto" style="max-height: 470px;"></div>
            </div>
            <div class="cart-summary">
                <div class="cart-summary-1"> 
                    <div class="summary-row"><span>Subtotal:</span><span id="subtotal">KES 0.00</span></div>
                    <div class="summary-row"><span>VAT (<span id="vatRateDisplay">16</span>%):</span><span id="tax">KES 0.00</span></div>
                    <div class="summary-row"><span>Discount:</span><input type="number" id="discount" class="form-control form-control-sm" style="width: 100px;" value="0" step="0.01"></div>
                    <div class="summary-row total-row"><span>Total:</span><span id="total">KES 0.00</span></div>
                    <div id="cashChangeSection" style="display: none;">
                        <div class="summary-row"><span>Amount Tendered (KES):</span><input type="number" id="amountTendered" class="form-control form-control-sm" style="width: 120px;" value="0" step="0.01"></div>
                        <div class="summary-row"><span>Change:</span><span id="changeAmount">KES 0.00</span></div>
                    </div>
                    <select id="paymentMethod" class="form-select mt-2">
                        <option value="cash">Cash</option>
                        <option value="card">Card</option>
                        <option value="mobile">Mobile</option>
                    </select>               
                </div>
                <div class="cart-summary-2">
                    <button class="btn btn-success w-100 mt-3" onclick="completeSale()"><i class="fas fa-check-circle me-2"></i>Complete Sale</button>
                    <button class="btn btn-outline-secondary w-100 mt-2" onclick="generateReceipt()"><i class="fas fa-receipt me-2"></i>Generate Receipt</button>
                    <button class="btn btn-outline-danger w-100 mt-2" onclick="clearCart()"><i class="fas fa-trash me-2"></i>Clear Cart</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div class="modal fade" id="receiptModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 420px;">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title"><i class="fas fa-receipt me-2"></i>Receipt</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="receiptContent" class="p-4"></div>
                </div>
                <div class="modal-footer border-0">
                    <div class="border p-2 mb-3" style="border-radius:8px; width: 100%; background:var(--bg-table-stripe);">
                        <div class="d-flex justify-content-between gap-2 flex-wrap">
                            <div class="flex-grow-1" style="min-width:140px;">
                                <label class="form-label small mb-0">Email receipt</label>
                                <div class="input-group input-group-sm">
                                    <input type="email" id="receiptEmail" class="form-control" placeholder="customer@example.com">
                                    <button class="btn btn-outline-primary" onclick="sendReceiptEmailFromModal()" style="font-size:0.75rem;">Send</button>
                                </div>
                            </div>
                            <div class="flex-grow-1" style="min-width:140px;">
                                <label class="form-label small mb-0">SMS receipt</label>
                                <div class="input-group input-group-sm">
                                    <input type="tel" id="receiptPhone" class="form-control" placeholder="+254700000000">
                                    <button class="btn btn-outline-primary" onclick="sendReceiptSMSFromModal()" style="font-size:0.75rem;">Send</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-outline-secondary" onclick="printReceipt()"><i class="fas fa-print me-2"></i>Print</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/permissions.js"></script>
    <script src="assets/js/pos.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script src="assets/js/theme-manager.js"></script>
    
    <script>
        // Bind sidebar links to close on mobile when clicked
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof bindMobileSidebarLinks === 'function') {
                bindMobileSidebarLinks();
            }
        });
    </script>
</body>
</html>
