<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - VendGrid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <link rel="stylesheet" href="assets/css/shared.css">
    <link rel="stylesheet" href="assets/css/reports.css">
     <link rel="stylesheet" href="assets/css/light-theme.css">
</head>
<body>
    <!-- Navbar (same as other pages) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html"><i class="fas fa-cash-register me-2"></i>VendGrid</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle me-1"></i><span id="userName">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#" onclick="signOut()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="sidebar">
        <a href="dashboard.html" class="sidebar-item" data-tooltip="Dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
        <a href="pos.html"       class="sidebar-item" data-tooltip="POS Terminal"><i class="fas fa-cash-register"></i><span>POS Terminal</span></a>
        <a href="inventory.html" class="sidebar-item" data-tooltip="Inventory"><i class="fas fa-boxes"></i><span>Inventory</span></a>
        <a href="reports.html"   class="sidebar-item active" data-tooltip="Reports"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
        <a href="users.html"     class="sidebar-item" data-tooltip="Users"><i class="fas fa-users"></i><span>Users</span></a>
        <a href="settings.html"  class="sidebar-item" data-tooltip="Settings"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>

    <!-- Toast container -->
    <div id="toastContainer"></div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Sales Reports</h1>
            <div class="d-flex gap-2">
                <select id="periodSelect" class="form-select w-auto">
                    <option value="7">Last 7 Days</option>
                    <option value="30" selected>Last 30 Days</option>
                    <option value="90">Last 90 Days</option>
                </select>
                <button class="btn btn-sm btn-outline-success" onclick="exportSalesToExcel()">
                    <i class="fas fa-file-excel me-1"></i> Export Excel
                </button>
                <button class="btn btn-sm btn-outline-primary" onclick="exportSalesToPDF()">
                    <i class="fas fa-file-pdf me-1"></i> Export PDF
                </button>
            </div>
        </div>

        <!-- KPI Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-3"><div class="stat-card"><h6 class="text-muted">Total Revenue</h6><h3 id="totalRevenue">-</h3></div></div>
            <div class="col-md-3"><div class="stat-card"><h6 class="text-muted">Total Sales</h6><h3 id="totalSales">-</h3></div></div>
            <div class="col-md-3"><div class="stat-card"><h6 class="text-muted">Average Order</h6><h3 id="avgOrder">-</h3></div></div>
            <div class="col-md-3"><div class="stat-card"><h6 class="text-muted">Total Tax (VAT)</h6><h3 id="totalTax">-</h3></div></div>
        </div>

        <!-- Charts Row -->
        <div class="row g-4 mb-4">
            <div class="col-lg-8"><div class="stat-card"><canvas id="revenueChart" height="300"></canvas></div></div>
            <div class="col-lg-4"><div class="stat-card"><canvas id="paymentChart" height="300"></canvas></div></div>
        </div>

        <!-- Product Performance (Phase 3) -->
        <div id="productPerformanceContainer"></div>
        <!-- Transaction Table -->
        <div class="stat-card">

            
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5>Transaction History</h5>
                <input type="text" id="salesSearch" class="form-control form-control-sm"
                       style="width:220px;" placeholder="Search transactions…">
            </div>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Transaction #</th>
                            <th>Date</th>
                            <th>Cashier</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="salesTable"></tbody>
                </table>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/permissions.js"></script>
    <script src="assets/js/reports.js"></script>
    <script src="assets/js/xlsx-export.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script src="assets/js/theme-manager.js"></script>
</body>
</html>
