

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email – VendGrid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Keep exact same shared + login theme as the rest of the app -->
    <link rel="stylesheet" href="assets/css/shared.css">
    <link rel="stylesheet" href="assets/css/login.css">
        <link rel="stylesheet" href="assets/css/light-theme.css">
    <style>
        /* ── Verify-email specific additions ── */
        .verify-card {
            position: relative;
            z-index: 2;
        }

        .verify-icon-ring {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.1rem;
            transition: background 0.3s, color 0.3s;
        }
        .verify-icon-ring.state-pending  { background: #e8f0fe; color: #007bff; }
        .verify-icon-ring.state-success  { background: #d1f5e0; color: #198754; }
        .verify-icon-ring.state-error    { background: #fde8e8; color: #dc3545; }
        .verify-icon-ring.state-warning  { background: #fff3cd; color: #d97706; }

        /* Spinner inside the ring */
        .vg-spin {
            width: 40px;
            height: 40px;
            border: 4px solid #c7d9f9;
            border-top-color: #007bff;
            border-radius: 50%;
            animation: vg-rotate 0.8s linear infinite;
        }
        @keyframes vg-rotate { to { transform: rotate(360deg); } }

        /* Email pill badge */
        .email-badge {
            display: inline-block;
            background: #f0f4ff;
            color: #0056b3;
            border: 1px solid #cfe2ff;
            border-radius: 50px;
            padding: 0.3rem 1rem;
            font-size: 0.88rem;
            font-weight: 600;
            margin: 0.6rem 0 1.2rem;
            word-break: break-all;
        }

        /* Steps hint */
        .steps-hint {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1rem 1.2rem;
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .steps-hint .step {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            font-size: 0.88rem;
            color: #495057;
            padding: 0.3rem 0;
        }
        .steps-hint .step i {
            color: #007bff;
            margin-top: 2px;
            flex-shrink: 0;
            width: 16px;
        }

        /* CTA buttons */
        .verify-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.65rem 1.8rem;
            border-radius: 50px;
            font-size: 0.93rem;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
        }
        .verify-btn.btn-primary-pill {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: #fff;
            box-shadow: 0 4px 14px rgba(0,123,255,0.32);
        }
        .verify-btn.btn-primary-pill:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(0,123,255,0.4);
        }
        .verify-btn.btn-ghost-pill {
            background: #f1f3f5;
            color: #495057;
        }
        .verify-btn.btn-ghost-pill:hover {
            background: #e2e6ea;
            transform: translateY(-1px);
        }

        /* Resend cooldown */
        .resend-area {
            margin-top: 1.2rem;
            font-size: 0.85rem;
            color: #6c757d;
        }
        .resend-area a {
            color: #007bff;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .resend-area a:hover { text-decoration: underline; }
        .resend-area a.disabled {
            color: #adb5bd;
            cursor: default;
            pointer-events: none;
        }

        /* Redirect notice */
        .redirect-notice {
            margin-top: 0.8rem;
            font-size: 0.82rem;
            color: #adb5bd;
        }

        /* Action button area */
        #actionArea {
            display: none;
        }

        @media (max-width: 480px) {
            .login-card { padding: 2rem 1.4rem; }
        }
    </style>
</head>
<body class="login-page">

    <!-- Same floating background as login/signup -->
    <div class="login-background">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
    </div>

    <div class="login-container">
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-lg-5 col-md-7 col-sm-9">

                    <div class="login-card verify-card text-center">

                        <!-- Brand -->
                        <a href="index.html" class="login-logo mb-4 d-inline-flex">
                            <i class="fas fa-cash-register me-2"></i>
                            <span>VendGrid</span>
                        </a>

                        <!-- Status icon ring -->
                        <div class="verify-icon-ring state-pending" id="iconRing">
                            <div class="vg-spin" id="spinner"></div>
                        </div>

                        <!-- Title -->
                        <h2 class="login-title" id="verifyTitle">Checking…</h2>

                        <!-- Sub-message -->
                        <p class="login-subtitle" id="verifyMsg">Please wait a moment.</p>

                        <!-- Email badge (shown in "sent" state) -->
                        <div id="emailBadgeWrap" style="display:none;">
                            <div class="email-badge" id="emailBadge"></div>
                        </div>

                        <!-- Steps hint (shown in "sent" state) -->
                        <div class="steps-hint" id="stepsHint" style="display:none;">
                            <div class="step">
                                <i class="fas fa-envelope-open-text"></i>
                                <span>Open the verification email we sent you.</span>
                            </div>
                            <div class="step">
                                <i class="fas fa-mouse-pointer"></i>
                                <span>Click the <strong>Verify Email</strong> button inside it.</span>
                            </div>
                            <div class="step">
                                <i class="fas fa-sign-in-alt"></i>
                                <span>You will be brought back here, then sent to Login.</span>
                            </div>
                        </div>

                        <!-- Action buttons (shown after verification completes or on error) -->
                        <div id="actionArea"></div>

                        <!-- Resend link (shown in "sent" state) -->
                        <div class="resend-area" id="resendArea" style="display:none;">
                            Didn't receive it?
                            <a id="resendLink" onclick="resendEmail()">Resend email</a>
                            <span id="resendCooldown" style="display:none;"></span>
                        </div>

                        <!-- Divider + back to login -->
                        <div class="login-footer mt-4" id="backToLoginFooter" style="display:none;">
                            <div class="login-divider"><span>or</span></div>
                            <a href="login.html" class="back-to-home-link">
                                <i class="fas fa-sign-in-alt me-2"></i>Already verified? Go to Login
                            </a>
                        </div>

                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>

    <script>
    /* ═══════════════════════════════════════════════════════════
       VendGrid – verify-email.html
       Two modes:
         A) No token in URL  →  "sent" state: show instructions + resend
         B) Token in URL     →  exchange token, then redirect to login
       ═══════════════════════════════════════════════════════════ */

    const iconRing        = document.getElementById('iconRing');
    const spinner         = document.getElementById('spinner');
    const titleEl         = document.getElementById('verifyTitle');
    const msgEl           = document.getElementById('verifyMsg');
    const emailBadgeWrap  = document.getElementById('emailBadgeWrap');
    const emailBadgeEl    = document.getElementById('emailBadge');
    const stepsHint       = document.getElementById('stepsHint');
    const actionArea      = document.getElementById('actionArea');
    const resendArea      = document.getElementById('resendArea');
    const resendLink      = document.getElementById('resendLink');
    const resendCooldown  = document.getElementById('resendCooldown');
    const backToLoginFooter = document.getElementById('backToLoginFooter');

    // ── Helpers ─────────────────────────────────────────────────

    function setIcon(state, faIcon) {
        iconRing.className = 'verify-icon-ring state-' + state;
        if (spinner) spinner.remove();
        iconRing.innerHTML = '<i class="fas ' + faIcon + '"></i>';
    }

    function showSent(email) {
        setIcon('pending', 'fa-paper-plane');
        titleEl.textContent = 'Check Your Email';
        msgEl.textContent   = 'A verification email has been sent to:';

        if (email) {
            emailBadgeEl.textContent = email;
            emailBadgeWrap.style.display = 'block';
        }

        stepsHint.style.display      = 'block';
        resendArea.style.display     = 'block';
        backToLoginFooter.style.display = 'block';
        actionArea.style.display     = 'block';
        actionArea.innerHTML = `
            <a href="login.html" class="verify-btn btn-primary-pill">
                <i class="fas fa-sign-in-alt"></i> I Have Verified My Email
            </a>`;
    }

    function showSuccess() {
        setIcon('success', 'fa-check-circle');
        titleEl.textContent = 'Email Verified!';
        msgEl.textContent   = 'Your account has been confirmed. You can now sign in.';
        actionArea.style.display = 'block';

        let secs = 4;
        const notice = document.createElement('p');
        notice.className = 'redirect-notice';
        notice.textContent = 'Redirecting to login in ' + secs + 's…';

        actionArea.innerHTML = `
            <a href="login.html" class="verify-btn btn-primary-pill">
                <i class="fas fa-sign-in-alt"></i> Go to Login
            </a>`;
        actionArea.appendChild(notice);

        const tick = setInterval(() => {
            secs--;
            if (secs <= 0) {
                clearInterval(tick);
                window.location.href = 'login.html';
            } else {
                notice.textContent = 'Redirecting to login in ' + secs + 's…';
            }
        }, 1000);
    }

    function showError(msg) {
        setIcon('error', 'fa-times-circle');
        titleEl.textContent = 'Verification Failed';
        msgEl.textContent   = msg || 'Something went wrong. Please try again.';
        actionArea.style.display = 'block';
        actionArea.innerHTML = `
            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
                <a href="login.html"  class="verify-btn btn-primary-pill">
                    <i class="fas fa-sign-in-alt"></i> Go to Login
                </a>
                <a href="signup.html" class="verify-btn btn-ghost-pill">
                    <i class="fas fa-user-plus"></i> Sign Up Again
                </a>
            </div>`;
    }

    function showExpired() {
        setIcon('warning', 'fa-link-slash');
        titleEl.textContent = 'Link Expired or Already Used';
        msgEl.textContent   = 'This verification link is no longer valid. If your email is already verified, you can sign in. Otherwise sign up again.';
        actionArea.style.display = 'block';
        actionArea.innerHTML = `
            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
                <a href="login.html"  class="verify-btn btn-primary-pill">
                    <i class="fas fa-sign-in-alt"></i> Go to Login
                </a>
                <a href="signup.html" class="verify-btn btn-ghost-pill">
                    <i class="fas fa-user-plus"></i> Sign Up
                </a>
            </div>`;
    }

    // ── Resend logic ─────────────────────────────────────────────
    let pendingEmail = null;
    try { pendingEmail = sessionStorage.getItem('vg_pending_email'); } catch(_) {}

    let resendCooldownActive = false;

    async function resendEmail() {
        if (resendCooldownActive) return;
        const email = pendingEmail;
        if (!email) {
            alert('Please go back to Sign Up to re-enter your email.');
            return;
        }
        resendCooldownActive = true;
        resendLink.classList.add('disabled');
        resendCooldown.style.display = 'inline';
        resendCooldown.textContent   = ' (wait 60s)';

        try {
            const baseUrl   = window.location.href.replace(/verify-email\.html.*$/, '');
            const verifyUrl = baseUrl + 'verify-email.html';
            await window.supabaseClient.auth.resend({
                type:  'signup',
                email: email,
                options: { emailRedirectTo: verifyUrl }
            });
        } catch(err) {
            console.warn('Resend error:', err);
        }

        let secs = 60;
        const interval = setInterval(() => {
            secs--;
            resendCooldown.textContent = ' (wait ' + secs + 's)';
            if (secs <= 0) {
                clearInterval(interval);
                resendCooldownActive = false;
                resendLink.classList.remove('disabled');
                resendCooldown.style.display = 'none';
            }
        }, 1000);
    }
    window.resendEmail = resendEmail;

    // ── Main flow ─────────────────────────────────────────────────
    (async () => {
        try {
            const client = window.supabaseClient;
            const params = new URLSearchParams(window.location.search);

            // Supabase can deliver the token as token_hash (OTP flow) or
            // as an access_token in the URL fragment (implicit flow).
            const tokenHash  = params.get('token_hash') || params.get('token');
            const type       = params.get('type') || 'email';
            const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
            const accessToken = hashParams.get('access_token');

            if (tokenHash) {
                // ── Mode B: incoming verification link from email ──────
                // Exchange the OTP token for a session
                const { error: verifyError } = await client.auth.verifyOtp({
                    token_hash: tokenHash,
                    type:       (type === 'signup' || type === 'email') ? 'email' : type
                });

                if (verifyError) {
                    const raw = verifyError.message || '';
                    if (raw.includes('expired') || raw.includes('invalid')) {
                        showExpired();
                    } else if (raw.includes('already confirmed')) {
                        showSuccess();
                    } else {
                        showError(raw);
                    }
                } else {
                    // Token exchanged successfully → confirmed!
                    // Sign out the auto-session so the user explicitly logs in.
                    try { await client.auth.signOut(); } catch(_) {}
                    showSuccess();
                }

            } else if (accessToken) {
                // ── Mode B (implicit): access_token in hash ────────────
                const { data: sessionData, error: sessionError } =
                    await client.auth.getSession();

                if (sessionError) throw sessionError;

                if (sessionData && sessionData.session) {
                    try { await client.auth.signOut(); } catch(_) {}
                    showSuccess();
                } else {
                    showExpired();
                }

            } else {
                // ── Mode A: user just signed up, no token yet ──────────
                // Clean up any stale session so they're not auto-logged in
                // with an unverified account.
                try { await client.auth.signOut(); } catch(_) {}
                showSent(pendingEmail);
            }

        } catch (err) {
            console.error('verify-email error:', err);
            showError(err && err.message ? err.message : 'An unexpected error occurred.');
        }
    })();
    </script>
    <script src="assets/js/theme-manager.js"></script>

</body>
</html>
