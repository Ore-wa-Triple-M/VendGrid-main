<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - VendGrid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/shared.css">
    <link rel="stylesheet" href="assets/css/login.css">
    <link rel="stylesheet" href="assets/css/light-theme.css">
    <style>
        .verify-status {
            transition: all 0.3s ease;
        }
        .cooldown-timer {
            font-size: 0.85rem;
            color: #6c757d;
        }
        .error-detail {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            padding: 0.75rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>
<body class="login-page">
    <div class="login-background">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
    </div>

    <div class="login-container">
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-lg-5 col-md-7 col-sm-9">
                    <div class="login-card text-center verify-status">
                        <a href="index.html" class="login-logo mb-4 d-inline-flex">
                            <i class="fas fa-cash-register me-2"></i>
                            <span>VendGrid</span>
                        </a>

                        <div id="verificationContent">
                            <div class="mb-4">
                                <i class="fas fa-envelope fa-3x text-primary mb-3"></i>
                                <h3 id="statusTitle">Verifying Your Email</h3>
                                <p id="statusMessage" class="text-muted">Please wait while we confirm your account...</p>
                            </div>
                            <div class="spinner-border text-primary" role="status" id="loadingSpinner">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>

                        <div id="actionButtons" style="display: none;">
                            <button id="resendButton" class="btn btn-outline-primary mt-3" onclick="resendVerificationEmail()">
                                <i class="fas fa-redo-alt me-2"></i>Resend Verification Email
                            </button>
                            <div class="mt-3">
                                <a href="login.html" class="btn btn-primary">Go to Login</a>
                            </div>
                        </div>

                        <div id="errorDetail" class="error-detail mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/app.js"></script>

    <script>
        let pendingEmail = null;
        let resendCooldown = false;
        let cooldownTimer = null;

        // Load pending email from session storage
        try {
            pendingEmail = sessionStorage.getItem('vg_pending_email');
        } catch(e) { console.warn('Session storage not available'); }

        // Helper to update UI
        function updateUI(status, title, message, showActions = false, isError = false) {
            const content = document.getElementById('verificationContent');
            const actions = document.getElementById('actionButtons');
            const spinner = document.getElementById('loadingSpinner');
            const errorDetail = document.getElementById('errorDetail');

            document.getElementById('statusTitle').textContent = title;
            document.getElementById('statusMessage').textContent = message;

            if (status === 'success') {
                spinner.style.display = 'none';
                if (isError) {
                    actions.style.display = 'block';
                } else {
                    setTimeout(() => {
                        window.location.href = 'login.html?verified=1';
                    }, 3000);
                }
            } else if (status === 'error') {
                spinner.style.display = 'none';
                actions.style.display = 'block';
                if (isError && message.includes('rate limit')) {
                    errorDetail.style.display = 'block';
                    errorDetail.innerHTML = '<strong>💡 Tip:</strong> Wait 5-10 minutes before trying again.';
                }
            } else {
                spinner.style.display = 'inline-block';
                actions.style.display = 'none';
                errorDetail.style.display = 'none';
            }
        }

        // Resend verification email with cooldown
        window.resendVerificationEmail = async function() {
            if (resendCooldown) {
                showNotification('Please wait 60 seconds before requesting another email.', 'warning');
                return;
            }

            if (!pendingEmail) {
                showNotification('Email address not found. Please sign up again.', 'error');
                window.location.href = 'signup.html';
                return;
            }

            resendCooldown = true;
            const resendBtn = document.getElementById('resendButton');
            const originalText = resendBtn.innerHTML;
            resendBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Sending...';
            resendBtn.disabled = true;

            try {
                // Build redirect URL dynamically
                const baseUrl = window.location.href.replace(/verify-email\.html.*$/, '');
                const verifyUrl = baseUrl + 'verify-email.html';

                const { error } = await supabaseClient.auth.resend({
                    type: 'signup',
                    email: pendingEmail,
                    options: { emailRedirectTo: verifyUrl }
                });

                if (error) {
                    if (error.message.includes('rate limit') || error.status === 429) {
                        showNotification('Too many requests. Please wait a few minutes.', 'warning');
                    } else if (error.message.includes('already confirmed')) {
                        showNotification('Email already verified! Redirecting to login...', 'success');
                        setTimeout(() => window.location.href = 'login.html', 2000);
                    } else {
                        showNotification('Failed to resend email. Please try again later.', 'error');
                    }
                } else {
                    showNotification('Verification email sent! Check your inbox.', 'success');
                }
            } catch(err) {
                console.error('Resend error:', err);
                showNotification('Unable to send email. Please try again later.', 'error');
            } finally {
                // Start 60-second cooldown
                let seconds = 60;
                resendBtn.innerHTML = `Wait ${seconds}s`;
                
                cooldownTimer = setInterval(() => {
                    seconds--;
                    if (seconds <= 0) {
                        clearInterval(cooldownTimer);
                        resendCooldown = false;
                        resendBtn.innerHTML = originalText;
                        resendBtn.disabled = false;
                    } else {
                        resendBtn.innerHTML = `Wait ${seconds}s`;
                    }
                }, 1000);
            }
        };

        // Main verification logic
        (async function verifyEmail() {
            try {
                const params = new URLSearchParams(window.location.search);
                const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
                
                const tokenHash = params.get('token_hash') || params.get('token');
                const accessToken = hashParams.get('access_token');
                const type = params.get('type');

                // Case 1: No token - user arrived after signup
                if (!tokenHash && !accessToken) {
                    if (pendingEmail) {
                        updateUI('pending', 'Check Your Inbox', 
                            `We sent a verification link to ${pendingEmail}. Click the link to activate your account.`, 
                            true, false);
                    } else {
                        updateUI('error', 'No Verification Required', 
                            'Your account may already be verified. Please try logging in.', 
                            true, true);
                    }
                    return;
                }

                // Case 2: Token exists - process verification
                updateUI('verifying', 'Verifying Your Email', 'Please wait while we confirm your account...', false, false);

                let verificationError = null;

                if (tokenHash) {
                    const { error } = await supabaseClient.auth.verifyOtp({
                        token_hash: tokenHash,
                        type: type === 'signup' || type === 'email' ? 'email' : type
                    });
                    verificationError = error;
                } else if (accessToken) {
                    const { error } = await supabaseClient.auth.getSession();
                    verificationError = error;
                }

                if (verificationError) {
                    const errorMsg = verificationError.message.toLowerCase();
                    
                    if (errorMsg.includes('expired') || errorMsg.includes('invalid')) {
                        updateUI('error', 'Verification Link Expired', 
                            'This link has expired or is no longer valid. Request a new verification email below.', 
                            true, true);
                    } else if (errorMsg.includes('already confirmed')) {
                        updateUI('success', 'Email Already Verified', 
                            'Your account is already confirmed. Redirecting to login...', 
                            false, false);
                    } else if (errorMsg.includes('rate limit') || verificationError.status === 429) {
                        updateUI('error', 'Too Many Attempts', 
                            'Please wait a few minutes before trying again.', 
                            true, true);
                    } else {
                        updateUI('error', 'Verification Failed', 
                            'Unable to verify your email. Please request a new link.', 
                            true, true);
                        console.error('Verification error:', verificationError);
                    }
                } else {
                    // Success! Clear pending email and redirect
                    try { sessionStorage.removeItem('vg_pending_email'); } catch(e) {}
                    updateUI('success', 'Email Verified Successfully!', 
                        'Your account is now active. Redirecting to login...', 
                        false, false);
                }

            } catch(err) {
                console.error('Verification exception:', err);
                updateUI('error', 'Something Went Wrong', 
                    'Please try again or contact support if the problem persists.', 
                    true, true);
            }
        })();

        // Clean up cooldown timer on page unload
        window.addEventListener('beforeunload', () => {
            if (cooldownTimer) clearInterval(cooldownTimer);
        });
    </script>
  
</body>
</html>
